<header class="app-nav">
  <div class="app-nav__bar">
    <a class="app-nav__logo" [routerLink]="'/' + routes.Catalogue" aria-label="NAS">
      <img src="assets/brand/nas-logo-on-light.svg" alt="NAS" width="100" height="33" />
    </a>

    <nav class="app-nav__links" aria-label="Primary">
      <a [routerLink]="'/' + routes.Catalogue" routerLinkActive="is-active">
        {{ 'core.nav.catalogue' | translate }}
      </a>
      @if (auth.isAuthenticated()) {
        <a [routerLink]="'/' + routes.MyLearnings" routerLinkActive="is-active">
          {{ 'core.nav.my_learnings' | translate }}
        </a>
      }
      <a [routerLink]="'/' + routes.WhoWeAre" routerLinkActive="is-active">
        {{ 'core.nav.who_we_are' | translate }}
      </a>
      <a [routerLink]="'/' + routes.Blogs" routerLinkActive="is-active">
        {{ 'core.nav.blogs' | translate }}
      </a>
    </nav>

    <div class="app-nav__actions">
      <button
        type="button"
        class="app-nav__lang"
        (click)="toggleLanguage()"
        [attr.aria-label]="'core.nav.language' | translate"
      >
        <i class="pi pi-globe"></i>
      </button>

      @if (auth.isAuthenticated()) {
        <a class="app-nav__profile" [routerLink]="'/' + routes.Profile">{{ auth.user()?.name }}</a>
      } @else {
        <a class="app-nav__login" [routerLink]="'/' + routes.Login">
          {{ 'core.nav.login' | translate }}
        </a>
      }

      <button type="button" class="app-nav__cta">{{ 'core.nav.request_demo' | translate }}</button>
    </div>
  </div>
</header>
