<div class="notif-bell" appClickOutside (appClickOutside)="close()">
  <button
    type="button"
    class="notif-bell__trigger"
    [attr.aria-label]="'core.notifications.title' | translate"
    [attr.aria-expanded]="isOpen()"
    (click)="toggle()"
  >
    <i class="pi pi-bell" aria-hidden="true"></i>
    @if (inbox.unreadCount() > 0) {
      <span class="notif-bell__badge">{{ inbox.unreadCount() > 99 ? '99+' : inbox.unreadCount() }}</span>
    }
  </button>

  @if (isOpen()) {
    <app-notification-panel (closed)="close()" />
  }
</div>
